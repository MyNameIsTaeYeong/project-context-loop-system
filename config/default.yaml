app:
  data_dir: "~/.context-loop/data"
  log_level: "INFO"

sources:
  confluence:
    enabled: true
    base_url: ""
    email: ""
    token_storage: "keyring"
    sync_interval_minutes: 30

  confluence_mcp:
    enabled: false
    server_url: ""                          # MCP 서버 엔드포인트 URL (예: "http://mcp-server:3001/mcp")
    transport: "http"                       # 전송 방식: "http" (Streamable HTTP) 또는 "sse"
    token_storage: "keyring"                # 인증 토큰은 OS keyring에 저장 (x-auth 헤더로 전달)
    auto_sync_enabled: false                # 등록된 싱크 대상 전체를 주기적으로 자동 재싱크
                                            # (enabled + server_url 설정 시에만 동작. 끄면 기존처럼
                                            # 대시보드 버튼 트리거만 가능)
    sync_interval_minutes: 30               # 자동 재싱크 주기(분) — auto_sync_enabled 가 켜진 경우
    sync_watermark_margin_minutes: 1440     # 증분 fetch 변경 조회(lastModified CQL) 마진(분).
                                            # CQL 날짜는 인증 사용자 타임존으로 해석되므로 기본
                                            # 24시간 마진이 어떤 타임존 조합에서도 누락을 막는다.
                                            # 중복 후보는 해시 비교로 걸러져 재인덱싱은 없다.
    sync_enumeration_max_pages: 100000      # 공간/서브트리 열거 안전 상한. 이 상한에 걸려 열거가
                                            # 잘리면 해당 싱크의 stale 삭제(prune)는 생략된다.

  git:
    enabled: false
    auto_sync_enabled: false                # 설정된 레포 전체를 주기적으로 자동 재싱크
                                            # (enabled + repositories 설정 시에만 동작. 끄면 기존처럼
                                            # 대시보드 버튼 트리거만 가능)
    sync_interval_minutes: 60               # 자동 재싱크 주기(분) — auto_sync_enabled 가 켜진 경우
    file_size_limit_kb: 500                 # 이 크기 초과 파일 제외
    supported_extensions:                   # 처리할 파일 확장자
      - ".py"
      - ".go"
      - ".java"
      - ".ts"
      - ".js"
      - ".tf"
      - ".yaml"
      - ".yml"
      - ".proto"
      - ".sql"

    repositories: []
    # repositories:                         # 수집 대상 레포지토리 목록
    #   - url: ""                           # Git URL (예: "git@github.com:company/monorepo.git")
    #     branch: "main"                    # 대상 브랜치
    #     products:                         # 상품별 스코프 정의
    #       product-name:
    #         display_name: "상품 이름"
    #         paths:                        # 포함할 경로 (glob 패턴)
    #           - "services/product/**"
    #         exclude:                      # 제외할 경로
    #           - "**/*_test.go"
    #           - "**/vendor/**"

    categories:                             # 문서 카테고리 (상품별로 각 카테고리의 문서 생성)
      architecture:
        display_name: "아키텍처"
        target_audience: "아키텍트, 시니어 개발자"
        prompt: |
          당신은 소프트웨어 아키텍트입니다. 다음 코드 분석 결과를 바탕으로
          이 상품의 아키텍처 문서를 작성하세요.
          포함할 내용: 전체 구조, 핵심 컴포넌트, 데이터 흐름,
          설계 패턴, 확장성 고려사항, 의존성 관계
      development:
        display_name: "개발 가이드"
        target_audience: "개발자"
        prompt: |
          당신은 시니어 개발자입니다. 다음 코드 분석 결과를 바탕으로
          이 상품의 개발 가이드를 작성하세요.
          포함할 내용: API 명세, 코드 구조, 핵심 함수/클래스 설명,
          에러 처리 패턴, 로컬 개발 환경 설정, 테스트 방법
      infrastructure:
        display_name: "인프라 운영"
        target_audience: "인프라 엔지니어, SRE"
        prompt: |
          당신은 DevOps/SRE 엔지니어입니다. 다음 코드 분석 결과를 바탕으로
          이 상품의 인프라 운영 문서를 작성하세요.
          포함할 내용: 배포 구성, 리소스 명세, 모니터링 포인트,
          스케일링 전략, 장애 대응 절차, 환경 변수/시크릿
      pricing:
        display_name: "과금 체계"
        target_audience: "프라이싱팀, 사업팀"
        prompt: |
          당신은 프라이싱 전문가입니다. 다음 코드 분석 결과를 바탕으로
          이 상품의 과금 관련 정보를 정리하세요.
          포함할 내용: 과금 단위, 비용 계산 로직, 리소스 사용량 측정,
          할인/무료 구간, 빌링 주기
      business:
        display_name: "사업 요약"
        target_audience: "사업팀, 영업팀, 경영진"
        prompt: |
          당신은 프로덕트 매니저입니다. 다음 코드 분석 결과를 바탕으로
          이 상품의 비기술적 요약을 작성하세요.
          포함할 내용: 핵심 기능, 고객 가치, 사용 시나리오,
          제약 사항, 경쟁사 대비 차별점 (코드에서 유추 가능한 부분)

    processing:                             # 멀티에이전트 처리 설정 (D-027, D-029)
      max_concurrent_workers: 10            # 동시 Worker Agent 수
      max_files_per_worker: 30              # Worker당 최대 파일 수 (초과 시 분할)
      min_files_per_worker: 3               # Worker당 최소 파일 수 (미만 시 상위와 병합)
      # 에이전트별 모델 설정 (엔드포인트 방식, D-010/D-029)
      # 미지정 시 상위 llm.endpoint/llm.model로 폴백
      worker:                               # Level 1 파일 요약 (경량 모델)
        endpoint: ""                        # 예: "http://haiku-server:8080/v1"
        model: ""
        api_key: ""
        headers: {}                         # 엔드포인트 호출 시 추가 헤더
      synthesizer:                          # Level 2 디렉토리 문서 (중간 모델)
        endpoint: ""                        # 예: "http://sonnet-server:8080/v1"
        model: ""
        api_key: ""
        headers: {}                         # 엔드포인트 호출 시 추가 헤더
      orchestrator:                         # Level 3 카테고리 문서 (고성능 모델)
        endpoint: ""                        # 예: "http://opus-server:8080/v1"
        model: ""
        api_key: ""
        headers: {}                         # 엔드포인트 호출 시 추가 헤더

processor:
  chunk_size: 512
  chunk_overlap: 50
  embedding_model: "text-embedding-3-small"
  embedding_provider: "endpoint"   # "openai" | "local" | "endpoint"
  embedding_endpoint: ""           # embedding_provider: "endpoint"일 때 사용 (예: "http://localhost:8080/v1")
  embedding_api_key: ""            # 엔드포인트 인증 키 (불필요한 경우 빈 문자열)
  embedding_headers: {}            # 엔드포인트 호출 시 추가 헤더 (예: {X-Org-Id: "abc"})
  # 임베딩 HTTP 요청 속도 제한 (git sync 등에서 429 Too Many Requests 방지).
  # 공유 클라이언트 1개 안의 전역 세마포어로 동시 in-flight 요청 총수를 캡한다.
  embedding_max_concurrency: 4     # 임베딩 동시 HTTP 요청 상한(전역) — "한 번에 너무 많은 요청" 방지
  embedding_max_retries: 5         # 429/일시적 오류 시 배치당 최대 시도 횟수
  embedding_backoff_base: 2.0      # 지수 백오프 밑(초). 429 응답에 Retry-After 헤더가 있으면 우선
  # 그래프 엔티티 임베딩 사전 구축(build_entity_embeddings) 설정.
  # 노드를 batch_size 단위 청크로 나눠 concurrency 개씩 병렬 호출한다.
  entity_embedding_batch_size: 100   # 청크당 엔티티 수
  entity_embedding_concurrency: 4    # 동시 호출 최대 개수 (크면 429 위험 — endpoint RPM 고려)
  # Confluence MCP 싱크의 Phase 2(인덱싱) 동시 처리 문서 수.
  # 1 이면 완전 직렬(rate limit 안전, 느림), 5 는 직렬 대비 약 5배 단축.
  # OpenAI text-embedding-3-small 기본 tier(5,000 RPM) 기준 10까지 여유.
  phase2_concurrency: 5

llm:
  provider: "endpoint"             # "openai" | "anthropic" | "endpoint"
  model: ""                        # 사용할 모델 ID
  endpoint: ""                     # provider: "endpoint"일 때 사용 (예: "http://localhost:11434/v1")
  api_key: ""                      # 엔드포인트 인증 키 (불필요한 경우 빈 문자열)
  headers: {}                      # 엔드포인트 호출 시 추가 헤더 (예: {X-Org-Id: "abc"})
  api_key_storage: "keyring"       # provider: "openai" | "anthropic"일 때 keyring 사용
  classifier_prompt: "default"
  # 인덱싱 LLM 호출(가상 질문 생성·LLM 본문 그래프)의 문서 입력 토큰 상한.
  # 모델 컨텍스트 윈도우에서 출력 예산(약 32768)과 안전 마진을 뺀 값으로 설정한다.
  #   예) 128K 모델 → 90000,  256K 모델 → 200000.
  # 이 한도를 넘는 문서는 R-3(가상질문=섹션 배치 분할)·R-2(본문그래프=unit 폴백)로 전환된다.
  # 미설정 시 200000 (기존 256K 가정 동작과 완전히 동일).
  max_input_tokens: 200000

  # Reasoning(thinking) 프로파일.
  # 호출부는 reasoning_mode="off" 같은 의도만 전달하고, 모델별 실제 페이로드는
  # 여기서 매핑한다. 모델 교체 시 호출부 수정 없이 이 블록만 갈아끼우면 된다.
  # 키는 자유롭게 정의 (예: "off", "low", "medium", "high"). 매칭되는 키가 없으면 무시.
  reasoning_profiles:
    # Qwen3 (기본): thinking 모드 비활성화로 JSON 추출 응답 안정화
    off:
      extra_body:
        chat_template_kwargs:
          enable_thinking: false

    # Qwen3 thinking 모드 활성화 (Qwen은 on/off 만 지원하므로 모든 단계가 동일)
    high:
      extra_body:
        chat_template_kwargs:
          enable_thinking: true

    # DeepSeek 예시 (모델 교체 시 위 'off'/'high'를 다음으로 갈아끼움):
    # off:
    #   extra_body:
    #     chat_template_kwargs:
    #       thinking: false
    #       reasoning_effort: "low"
    # low:
    #   extra_body:
    #     chat_template_kwargs:
    #       thinking: true
    #       reasoning_effort: "low"
    # high:
    #   extra_body:
    #     chat_template_kwargs:
    #       thinking: true
    #       reasoning_effort: "high"

reranker:
  endpoint: ""                     # 리랭커 API 엔드포인트 (예: "http://localhost:8080/rerank")
  model: ""                        # 사용할 리랭커 모델 ID
  api_key: ""                      # 엔드포인트 인증 키 (불필요한 경우 빈 문자열)
  headers: {}                      # 엔드포인트 호출 시 추가 헤더 (예: {X-Org-Id: "abc"})

search:
  similarity_threshold: 0.3       # 코사인 유사도 최소값 (이 값 미만 청크 제외)
  reranker_enabled: false          # 전용 리랭커 사용 여부 (reranker.endpoint/model 필요)
  reranker_top_k: 5                # 리랭킹 후 반환할 최대 청크 수
  reranker_score_threshold: 0.3    # 리랭크 점수 최소값 (모델 의존, 보통 0~1 — Cohere/Jina 호환)
  hyde_enabled: false              # HyDE (Hypothetical Document Embedding) 사용 여부

eval:
  # 검색 품질 평가용 LLM 설정
  # (scripts/build_synthetic_gold_set.py + scripts/eval_search.py 가 사용).
  # 자기 평가 편향을 줄이려면 generator/judge 를 system 모델 (llm.*) 과
  # 다른 family 의 모델로 분리하는 것을 권장한다.
  # 각 키가 비어 있으면 상위 llm.* 값으로 폴백한다 (headers/reasoning_profiles 포함).
  # reasoning_profiles 는 모델 family 별로 페이로드 형식이 다르므로 (Qwen3 의
  # enable_thinking vs DeepSeek 의 thinking 등), generator/judge 가 system 과
  # 다른 family 라면 여기서 별도 매핑을 정의하는 것이 안전하다.
  generator:                       # 골드셋 질의 합성
    endpoint: ""                   # 예: "http://strong-model:8080/v1"
    model: ""                      # 예: "gpt-4o" 또는 "claude-sonnet-4"
    api_key: ""
    headers: {}                    # 예: {X-Org-Id: "abc"}
    reasoning_profiles: {}         # 예: {off: {extra_body: {chat_template_kwargs: {thinking: false}}}}
  judge:                           # 답변 가능성·품질 채점
    endpoint: ""                   # 예: "http://other-family:8080/v1"
    model: ""                      # generator 와 다른 family 권장
    api_key: ""
    headers: {}
    reasoning_profiles: {}         # generator 와 다른 family 라면 별도 매핑

storage:
  vector_db: "chromadb"
  graph_db: "networkx"

web:
  host: "127.0.0.1"
  port: 8000

mcp:
  transport: "stdio"
  sse_port: 3001
  sse_host: "127.0.0.1"                    # SSE 바인딩 인터페이스. 기본값은 호스트 PC 자신만 접속.
                                           # 사내 LAN 의 다른 PC(부서원 opencode)에서 접속하려면 "0.0.0.0"
                                           # (주의: 인증이 없으므로 신뢰된 사내망에서만 노출할 것)
  max_context_chunks: 10
  include_graph_by_default: true
  # 그래프 탐색이 도달했지만 벡터 검색이 못 찾은 문서의 본문을 컨텍스트에
  # 첨부할 때의 상한 (설계 A). 청크가 문서 단위라 무거우므로 개수와 토큰을
  # 함께 가드한다. 0 이면 그래프 연결 문서 첨부 off (= 엔티티/관계 텍스트만).
  max_graph_context_docs: 3
  max_graph_context_tokens: 6000
  # Parent-document retrieval — 벡터/그래프 적중 청크가 섹션 폴백 청크
  # (문서가 max_embedding_tokens 초과로 섹션 분할된 경우)인 문서는 해당
  # 섹션 대신 documents.original_content 전문을 컨텍스트에 첨부한다.
  # 예산(문서당/총합)을 초과하는 문서는 기존 섹션 청크를 유지한다 (안전 폴백).
  # 예산 산정 (256K LLM 전제): 일반 청크 최악치 10×8K=80K + 전문 96K
  # + 그래프/소스코드/프롬프트 오버헤드 + 응답 32K ≈ 220K < 256K.
  # (기존 context_max_tokens 키는 코드 어디서도 참조되지 않는 죽은 설정이라 제거)
  parent_document_enabled: true
  parent_document_max_doc_tokens: 32000   # 문서당 한도 — 초과 문서는 섹션 청크 유지
  parent_document_total_tokens: 96000     # 전문 첨부 총합 한도 (벡터+그래프 합산)
