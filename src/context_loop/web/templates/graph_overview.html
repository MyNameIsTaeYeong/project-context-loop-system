{% extends "base.html" %}

{% block title %}Graph - Context Loop{% endblock %}

{% block head %}
<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
{% endblock %}

{% block content %}
<div x-data="graphOverview()" x-init="init()">

    <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem;">
        <h2 style="margin: 0;">Knowledge Graph</h2>
        <button class="outline" @click="refreshAll()" :aria-busy="loading">Refresh</button>
    </div>

    <!-- ====================================================================
         1. 통합 품질 KPI 패널 (analyst 5.1)
         ==================================================================== -->
    <section style="margin-bottom: 1.5rem;">
        <h3 style="margin-top: 0;">Merge Quality</h3>
        <template x-if="mergeQuality === null && !mqError">
            <p aria-busy="true">Loading merge quality...</p>
        </template>
        <template x-if="mqError">
            <article class="kpi-error">
                <p><strong>Failed to load merge quality:</strong> <span x-text="mqError"></span></p>
            </article>
        </template>
        <template x-if="mergeQuality">
            <div>
                <div class="kpi-grid">
                    <!-- 표면 중복 -->
                    <article class="kpi-card" :class="kpiClass('surface', mergeQuality.metrics.duplication_ratio_surface)">
                        <header class="kpi-head">
                            <span>표면 중복</span>
                            <span class="kpi-help" title="공백/하이픈/언더스코어를 제거하고 lower-case한 키 기준으로 2개 이상의 노드가 같은 키를 공유하는 그룹에 속한 노드의 비율. 0에 가까울수록 양호.">?</span>
                        </header>
                        <p class="stat-number" x-text="formatPct(mergeQuality.metrics.duplication_ratio_surface)"></p>
                        <small x-text="surfaceDupNodesLabel()"></small>
                    </article>

                    <!-- 의미 중복 -->
                    <article class="kpi-card" :class="kpiClass('semantic', mergeQuality.metrics.duplication_ratio_semantic)">
                        <header class="kpi-head">
                            <span>의미 중복</span>
                            <span class="kpi-help" title="엔티티 이름 임베딩 cosine 유사도 >= 0.85인 노드를 union-find로 클러스터링한 후 크기 >= 2인 클러스터에 속한 노드의 비율. 임베딩 캐시가 활성화되어 있어야 산출 가능.">?</span>
                        </header>
                        <template x-if="mergeQuality.metrics.duplication_ratio_semantic === null || mergeQuality.metrics.duplication_ratio_semantic === undefined">
                            <p class="stat-number kpi-muted">미계산</p>
                        </template>
                        <template x-if="mergeQuality.metrics.duplication_ratio_semantic !== null && mergeQuality.metrics.duplication_ratio_semantic !== undefined">
                            <p class="stat-number" x-text="formatPct(mergeQuality.metrics.duplication_ratio_semantic)"></p>
                        </template>
                        <small>cosine >= 0.85</small>
                    </article>

                    <!-- 타입 충돌 -->
                    <article class="kpi-card" :class="kpiClass('typeconflict', mergeQuality.metrics.type_conflict_count)">
                        <header class="kpi-head">
                            <span>타입 충돌</span>
                            <span class="kpi-help" title="LOWER(entity_name)이 동일하지만 entity_type이 2종 이상으로 분기된 그룹의 수. 0에 가까울수록 양호.">?</span>
                        </header>
                        <p class="stat-number" x-text="mergeQuality.metrics.type_conflict_count"></p>
                        <small>groups</small>
                    </article>

                    <!-- 크로스-문서 병합 -->
                    <article class="kpi-card kpi-info">
                        <header class="kpi-head">
                            <span>크로스-문서 병합</span>
                            <span class="kpi-help" title="2개 이상의 document_id와 연결된 노드의 비율 — 병합이 실제로 일어난 노드의 비율 (운영 지표).">?</span>
                        </header>
                        <p class="stat-number" x-text="formatPct(mergeQuality.metrics.cross_document_node_ratio)"></p>
                        <small x-text="crossDocLabel()"></small>
                    </article>

                    <!-- 고아 엣지 -->
                    <article class="kpi-card" :class="kpiClass('orphan', mergeQuality.metrics.orphan_edge_count)">
                        <header class="kpi-head">
                            <span>고아 엣지</span>
                            <span class="kpi-help" title="양쪽(또는 한쪽) 끝이 graph_nodes에 존재하지 않는 엣지의 수. 0이 정상.">?</span>
                        </header>
                        <p class="stat-number" x-text="mergeQuality.metrics.orphan_edge_count"></p>
                        <small>edges</small>
                    </article>
                </div>

                <!-- 잠재 중복 그룹 패널 -->
                <details style="margin-top: 1rem;" open>
                    <summary>
                        <strong>잠재 중복 그룹</strong>
                        <span class="badge badge-source" x-text="(mergeQuality.duplicate_groups || []).length + ' groups'"></span>
                    </summary>
                    <template x-if="(mergeQuality.duplicate_groups || []).length === 0">
                        <p style="margin: 0.5rem 0;"><em>No duplicate groups detected.</em></p>
                    </template>
                    <div class="dup-grid">
                        <template x-for="(group, idx) in (mergeQuality.duplicate_groups || []).slice(0, 20)" :key="(group.kind || '') + '_' + (group.key || idx)">
                            <article class="dup-card" @click="highlightDupGroup(group)">
                                <header>
                                    <code x-text="group.key || '(unkeyed)'"></code>
                                    <span class="badge badge-dup-kind" x-text="group.kind || 'unknown'"></span>
                                </header>
                                <ul class="dup-members">
                                    <template x-for="m in (group.members || [])" :key="m.id">
                                        <li>
                                            <a href="#" @click.prevent.stop="openNode(m.id)" x-text="m.name"></a>
                                            <small x-text="'(' + (m.type || '?') + ', id=' + m.id + ')'"></small>
                                        </li>
                                    </template>
                                </ul>
                                <footer>
                                    <button class="outline" disabled title="자동 병합은 본 라운드에서 비활성화">병합</button>
                                    <button class="outline" @click.stop="highlightDupGroup(group)">그래프로 강조</button>
                                </footer>
                            </article>
                        </template>
                    </div>
                </details>
            </div>
        </template>
    </section>

    <!-- ====================================================================
         2. 타입별 클러스터 카드 그리드 (analyst 5.2)
         ==================================================================== -->
    <section style="margin-bottom: 1.5rem;">
        <h3>Type Clusters</h3>
        <p>
            <small x-text="clustersSummary()"></small>
        </p>
        <template x-if="clusters === null && !clustersError">
            <p aria-busy="true">Loading clusters...</p>
        </template>
        <template x-if="clustersError">
            <article class="kpi-error">
                <p><strong>Failed to load clusters:</strong> <span x-text="clustersError"></span></p>
            </article>
        </template>
        <template x-if="clusters">
            <div class="cluster-grid">
                <template x-for="c in clusters" :key="c.entity_type">
                    <article class="cluster-card"
                             :class="{'cluster-card-active': selectedType === c.entity_type}"
                             @click="openCluster(c.entity_type)">
                        <header class="cluster-head">
                            <span class="cluster-dot" :style="'background:' + groupColor(c.entity_type)"></span>
                            <strong x-text="c.entity_type"></strong>
                        </header>
                        <p class="stat-number" x-text="c.node_count"></p>
                        <small>
                            <span x-text="c.edge_count + ' edges'"></span>
                        </small>
                        <ul class="cluster-top">
                            <template x-for="t in (c.top_entities || []).slice(0, 5)" :key="t.id">
                                <li>
                                    <a href="#" @click.prevent.stop="openNode(t.id)" x-text="t.name"></a>
                                    <small x-text="'(' + (t.document_count || 0) + ' docs)'"></small>
                                </li>
                            </template>
                        </ul>
                    </article>
                </template>
            </div>
        </template>
    </section>

    <!-- ====================================================================
         3. 클러스터 펼침 그래프 + 사이드 패널 (analyst 5.3)
         ==================================================================== -->
    <section x-show="selectedType !== null" style="margin-bottom: 1.5rem;">
        <header style="display: flex; align-items: center; gap: 1rem; margin-bottom: 0.5rem;">
            <h3 style="margin: 0;">
                Cluster: <span x-text="selectedType"></span>
                <small x-text="clusterCountLabel()"></small>
            </h3>
            <input type="search"
                   placeholder="Filter nodes..."
                   x-model="clusterQuery"
                   @input.debounce.300ms="openCluster(selectedType, clusterQuery)"
                   style="max-width: 240px; margin: 0;">
            <button class="outline" @click="closeCluster()">Close</button>
        </header>

        <div class="cluster-layout">
            <!-- 그래프 컨테이너 -->
            <div class="cluster-graph-wrap">
                <template x-if="clusterLoading">
                    <p aria-busy="true">Loading cluster nodes...</p>
                </template>
                <template x-if="clusterError">
                    <article class="kpi-error">
                        <p><strong>Failed to load cluster:</strong> <span x-text="clusterError"></span></p>
                    </article>
                </template>
                <div id="cluster-graph-container"
                     style="height: 600px; border: 1px solid var(--pico-muted-border-color, #ddd); border-radius: 0.4rem;"></div>
            </div>

            <!-- 사이드 패널 -->
            <aside class="node-detail-panel">
                <template x-if="nodeDetail === null && !nodeLoading">
                    <p><em>노드를 클릭해 상세 정보를 확인하세요.</em></p>
                </template>
                <template x-if="nodeLoading">
                    <p aria-busy="true">Loading node...</p>
                </template>
                <template x-if="nodeError">
                    <article class="kpi-error">
                        <p><strong>Failed to load node:</strong> <span x-text="nodeError"></span></p>
                    </article>
                </template>
                <template x-if="nodeDetail">
                    <div>
                        <header class="node-head">
                            <h4 style="margin: 0;" x-text="nodeDetail.name"></h4>
                            <span class="badge badge-source" x-text="nodeDetail.entity_type || 'other'"></span>
                        </header>
                        <p>
                            <small>
                                id: <code x-text="nodeDetail.id"></code>
                            </small>
                        </p>
                        <template x-if="nodeDetail.properties && nodeDetail.properties.description">
                            <p x-text="nodeDetail.properties.description"></p>
                        </template>

                        <!-- 추출된 문서 -->
                        <h5 style="margin-bottom: 0.25rem;">
                            📄 추출된 문서
                            <span class="badge badge-source" x-text="'(' + (nodeDetail.documents || []).length + ')'"></span>
                        </h5>
                        <template x-if="(nodeDetail.documents || []).length === 0">
                            <p><em>출처 문서 정보 없음 (레거시 스키마일 수 있음)</em></p>
                        </template>
                        <ul class="node-docs">
                            <template x-for="d in (nodeDetail.documents || [])" :key="d.id">
                                <li>
                                    <a :href="'/documents/' + d.id" x-text="d.title || ('Document ' + d.id)"></a>
                                    <small class="badge badge-source" x-text="d.source_type || 'unknown'"></small>
                                </li>
                            </template>
                        </ul>

                        <!-- 이웃 노드 -->
                        <h5 style="margin-bottom: 0.25rem; margin-top: 1rem;">
                            🔗 이웃 노드
                            <span class="badge badge-source" x-text="'(' + (nodeDetail.neighbors || []).length + ')'"></span>
                        </h5>
                        <template x-if="(nodeDetail.neighbors || []).length === 0">
                            <p><em>연결된 이웃 없음.</em></p>
                        </template>
                        <ul class="node-neighbors">
                            <template x-for="n in (nodeDetail.neighbors || [])" :key="n.id + '_' + n.relation_type + '_' + n.direction">
                                <li>
                                    <span class="neighbor-arrow" x-text="n.direction === 'out' ? '→' : '←'"></span>
                                    <a href="#" @click.prevent="openNode(n.id)" x-text="n.name"></a>
                                    <small x-text="'(' + (n.entity_type || '?') + ')'"></small>
                                    <small class="badge badge-source" x-text="n.relation_type || ''"></small>
                                </li>
                            </template>
                        </ul>

                        <!-- 병합 액션 (비활성화) -->
                        <div style="margin-top: 1rem;">
                            <button class="outline" disabled title="자동 병합은 본 라운드에서 비활성화">병합</button>
                            <small> 자동 병합은 본 라운드에서 비활성화 (analyst 6절)</small>
                        </div>
                    </div>
                </template>
            </aside>
        </div>
    </section>

</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/graph_overview.js"></script>
{% endblock %}
