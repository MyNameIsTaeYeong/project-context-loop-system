<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Context Loop{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <link rel="stylesheet" href="/static/css/app.css">
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="container-fluid">
        <ul>
            <li><a href="/"><strong>Context Loop</strong></a></li>
        </ul>
        <ul>
            <li><a href="/">Dashboard</a></li>
            <li><a href="/chat">Chat</a></li>
            <li><a href="/editor">New Document</a></li>
            <li><a href="/confluence">Confluence</a></li>
            <li><a href="/confluence-mcp">Confluence MCP</a></li>
            <li><a href="/git-sync">Git Sync</a></li>
        </ul>
    </nav>
    <main class="container">
        <div id="toast-area"></div>
        {% block content %}{% endblock %}
    </main>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="/static/js/app.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
